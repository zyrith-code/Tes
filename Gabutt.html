<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love or Sad Effect 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Arial Black', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .question {
            font-size: 36px;
            color: #ff6b9d;
            margin-bottom: 60px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .buttons {
            display: flex;
            gap: 40px;
            z-index: 100;
        }

        button {
            padding: 25px 60px;
            font-size: 26px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-love {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            color: white;
        }

        .btn-sad {
            background: linear-gradient(45deg, #636e72, #2d3436);
            color: white;
        }

        button:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .buttons.disabled button {
            opacity: 0.6;
            pointer-events: none;
            transform: none !important;
        }

        /* PARTICLES CONTAINER */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* LOVE EFFECT */
        .love-heart {
            position: absolute;
            width: 45px;
            height: 40px;
            background: #ff6b9d;
            transform: rotate(-45deg);
            animation: loveFly 3.2s ease-out forwards;
            box-shadow: 0 8px 20px rgba(255,107,157,0.7);
        }

        .love-heart::before,
        .love-heart::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 36px;
            background: inherit;
            border-radius: 22px 22px 0 0;
            transform: rotate(-45deg);
            left: 11px;
        }

        .love-heart::after {
            transform: rotate(45deg);
            left: 0;
        }

        @keyframes loveFly {
            0% {
                transform: rotate(-45deg) translateY(0) scale(0);
                opacity: 0;
            }
            25% {
                opacity: 1;
                transform: rotate(-45deg) translateY(-50px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: rotate(-45deg) translateY(-170vh) translateX(35vw) scale(0.4) rotate(1260deg);
            }
        }

        .love-emoji {
            position: absolute;
            font-size: 38px;
            animation: loveEmojiFly 2.8s ease-out forwards;
            text-shadow: 0 0 25px rgba(255,255,255,0.9);
        }

        @keyframes loveEmojiFly {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            30% {
                opacity: 1;
                transform: scale(1.4) rotate(360deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.3) rotate(1620deg) translateY(-140vh) translateX(25vw);
            }
        }

        /* SAD EFFECT */
        .sad-particle {
            position: absolute;
            animation: sadFall 2.8s ease-in forwards;
        }

        .sad-tear {
            font-size: 30px;
            color: #74b9ff;
            text-shadow: 0 0 15px rgba(116,185,255,0.9);
            animation-delay: 0s;
        }

        .sad-emoji {
            font-size: 36px;
            color: #2d3436;
            text-shadow: 0 0 20px rgba(45,52,54,0.8);
        }

        @keyframes sadFall {
            0% {
                transform: translateY(-60vh) scale(0.6);
                opacity: 0;
            }
            25% {
                opacity: 1;
                transform: translateY(0) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translateY(130vh) translateX(40px) scale(0.9) rotate(270deg);
            }
        }

        .sad-cloud {
            position: absolute;
            font-size: 28px;
            color: #b2bec3;
            animation: sadCloudFloat 3.5s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(178,190,195,0.7);
        }

        @keyframes sadCloudFloat {
            0%, 100% {
                transform: translateX(0) translateY(0);
            }
            50% {
                transform: translateX(50px) translateY(-20px);
            }
        }

        .broken-heart {
            position: absolute;
            font-size: 32px;
            color: #636e72;
            animation: brokenFall 3s ease-in forwards;
        }

        @keyframes brokenFall {
            0% {
                transform: scale(1.5) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(0.5) rotate(720deg) translateY(120vh) translateX(20vw);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="question">Apakah kamu menyukai ku? 💕</div>
    
    <div class="buttons" id="buttons">
        <button class="btn-love" onclick="loveEffect()">IYA 😍💖</button>
        <button class="btn-sad" onclick="sadEffect()">TIDAK 😢</button>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        const buttonsContainer = document.getElementById('buttons');

        // LOVE EFFECT - HATI MELEDAK
        function loveEffect() {
            buttonsContainer.classList.add('disabled');
            
            // 40 Custom Hearts
            for(let i = 0; i < 40; i++) {
                setTimeout(() => createLoveHeart(), i * 60);
            }
            
            // 30 Love Emojis
            for(let i = 0; i < 30; i++) {
                setTimeout(() => createLoveEmoji(), i * 80);
            }
        }

        function createLoveHeart() {
            const heart = document.createElement('div');
            heart.className = 'love-heart';
            const colors = ['#ff6b9d', '#ff8fab', '#ff1493', '#ff69b4', '#ff4757'];
            heart.style.background = colors[Math.floor(Math.random() * colors.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 35 + 45 + 'vh';
            heart.style.animationDuration = (2.8 + Math.random() * 0.8) + 's';
            
            particlesContainer.appendChild(heart);
            setTimeout(() => heart.remove(), 4200);
        }

        function createLoveEmoji() {
            const emojis = ['💖', '💕', '💗', '💓', '💞', '💝', '❤️‍🔥', '🩷'];
            const heart = document.createElement('div');
            heart.className = 'love-emoji';
            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 30 + 50 + 'vh';
            heart.style.animationDuration = (2.5 + Math.random() * 0.6) + 's';
            
            particlesContainer.appendChild(heart);
            setTimeout(() => heart.remove(), 3800);
        }

        // SAD EFFECT - PARTIKEL SEDIH
        function sadEffect() {
            buttonsContainer.classList.add('disabled');
            
            // 45 Sad Emojis jatuh
            const sadEmojis = ['😢', '😭', '🥺', '😔', '😞', '😣', '🙁', '😥'];
            for(let i = 0; i < 45; i++) {
                setTimeout(() => createSadEmoji(sadEmojis), i * 50);
            }
            
            // 60 Air Mata
            for(let i = 0; i < 60; i++) {
                setTimeout(() => createSadTear(), i * 35);
            }
            
            // 20 Broken Hearts
            for(let i = 0; i < 20; i++) {
                setTimeout(() => createBrokenHeart(), i * 120);
            }
            
            // 18 Sad Clouds
            for(let i = 0; i < 18; i++) {
                setTimeout(() => createSadCloud(), i * 180);
            }
        }

        function createSadEmoji(sadEmojis) {
            const particle = document.createElement('div');
            particle.className = 'sad-particle';
            particle.innerHTML = `<div class="sad-emoji">${sadEmojis[Math.floor(Math.random() * sadEmojis.length)]}</div>`;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '-30vh';
            particle.style.animationDuration = (2.2 + Math.random() * 1.2) + 's';
            
            particlesContainer.appendChild(particle);
            setTimeout(() => particle.remove(), 3800);
        }

        function createSadTear() {
            const particle = document.createElement('div');
            particle.className = 'sad-particle';
            particle.innerHTML = '<div class="sad-tear">💧</div>';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '-20vh';
            particle.style.animationDuration = (2 + Math.random() * 1) + 's';
            
            particlesContainer.appendChild(particle);
            setTimeout(() => particle.remove(), 3500);
        }

        function createBrokenHeart() {
            const particle = document.createElement('div');
            particle.className = 'broken-heart';
            particle.innerHTML = '💔';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '20vh';
            particle.style.animationDuration = (2.5 + Math.random() * 1) + 's';
            
            particlesContainer.appendChild(particle);
            setTimeout(() => particle.remove(), 4000);
        }

        function createSadCloud() {
            const clouds = ['☁️', '🌥️', '⛅', '🌩️'];
            const cloud = document.createElement('div');
            cloud.className = 'sad-cloud';
            cloud.innerHTML = clouds[Math.floor(Math.random() * clouds.length)];
            cloud.style.left = Math.random() * 75 + 'vw';
            cloud.style.top = '8vh';
            cloud.style.animationDuration = (3.2 + Math.random() * 1.8) + 's';
            
            particlesContainer.appendChild(cloud);
            setTimeout(() => cloud.remove(), 4500);
        }
    </script>
    <br>
        <br>    <br>
    <div class="question">tik tok :@dap_ireng </div>
</body>
</html>
